name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Core test matrix: stable + nightly × Linux + macOS
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }} / ${{ matrix.toolchain }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        toolchain: [stable, nightly]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust ${{ matrix.toolchain }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.toolchain }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.toolchain }}-

      - name: cargo test (default features)
        run: cargo test --verbose

      - name: cargo test (no default features)
        run: cargo test --no-default-features --verbose

      - name: cargo test (all features, Linux only)
        if: runner.os == 'Linux'
        run: cargo test --features "huge-pages,guard-pages,mlock" --verbose

  # ──────────────────────────────────────────────────────────────────────────
  # Lint: fmt + clippy
  # ──────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (stable)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install stable + rustfmt + clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy (default features)
        run: cargo clippy -- -D warnings

      - name: cargo clippy (no default features)
        run: cargo clippy --no-default-features -- -D warnings

  # ──────────────────────────────────────────────────────────────────────────
  # Docs: ensure docs.rs-equivalent build succeeds
  # ──────────────────────────────────────────────────────────────────────────
  docs:
    name: Docs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install nightly (required for --all-features doc build)
        uses: dtolnay/rust-toolchain@nightly

      - name: cargo doc (deny broken intra-doc links)
        run: |
          RUSTDOCFLAGS="-D rustdoc::broken_intra_doc_links" \
          cargo doc --no-deps --all-features 2>&1

  # ──────────────────────────────────────────────────────────────────────────
  # Security audit: check for known-vulnerable dependencies
  # ──────────────────────────────────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install cargo-audit --quiet

      - name: cargo audit
        run: cargo audit